services:
  app:
    build: .
    env_file:
      - .env
    volumes:
      - .:/var/www/html
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "composer install --no-interaction --prefer-dist &&
             php -S 0.0.0.0:8000 -t public"

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE:-desafio_revvo}
      POSTGRES_USER: ${DB_USERNAME:-desafio_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-desafio_pass}
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-desafio_user} -d ${DB_DATABASE:-desafio_revvo}']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
